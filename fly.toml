# fly.toml app configuration file generated for aeroinspect-backend on 2026-05-04T14:38:47+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aeroinspect-backend'
primary_region = 'nrt'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  # 운영 신뢰성: 0 = 콜드스타트 발생 (첫 요청 수초 지연, 드론 라이브 스트림 연결 시 끊김 위험).
  # 상업 운영(입주자 사용) 권장값 = 1. 변경 시 `flyctl deploy` 1회로 즉시 반영.
  # 자세한 트레이드오프: DEPLOYMENT_GUIDE.md "운영 신뢰성" 섹션 참조.
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
