# alembic.ini - Alembic DB migration config
# Usage:
#   alembic revision --autogenerate -m "desc"
#   alembic upgrade head
#   alembic downgrade -1

[alembic]
script_location = alembic

# Actual URL is overridden by alembic/env.py (settings.DATABASE_URL)
sqlalchemy.url = placeholder://overridden-by-env-py

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
