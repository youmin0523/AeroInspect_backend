# =============================================
# M4: 열화상 U-Net 세그멘테이션 설정
# 모델: U-Net (EfficientNet-B3 backbone) → ONNX
# 클래스: background + 4 단열/난방 하자
# =============================================

model:
  encoder: efficientnet-b3
  encoder_weights: imagenet
  in_channels: 3           # 온도맵 1ch → 3ch 복제 (EfficientNet 호환)
  num_classes: 5            # background + 4 defect classes

classes:
  0: background
  1: window_insulation      # B-01: 창호 단열 불량
  2: wall_insulation        # B-02: 벽체 단열 공백·탈락
  3: window_airtight        # B-05: 창호 기밀 불량
  4: floor_heating          # D-01: 바닥 난방 불량

data:
  thermal_dir: ./datasets/thermal/thermal_maps
  mask_dir: ./datasets/thermal/masks
  rgb_dir: ./datasets/thermal/rgb
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

training:
  batch_size: 16
  epochs: 100
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: CosineAnnealingLR
  T_max: 100
  eta_min: 1.0e-6
  loss: dice_ce             # Dice + CrossEntropy 결합

input:
  height: 192               # IRC-256CA 해상도
  width: 256

# class weights (클래스 불균형 보정)
class_weights: [0.1, 1.5, 1.5, 1.2, 1.3]

# 목표 수량: 2,500 페어 (RGB + Thermal + Mask)
