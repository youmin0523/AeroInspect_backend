# 모델: YOLOv8m-seg (인스턴스 세그멘테이션) → ONNX
# 클래스: wall_edge, ceiling_edge, door_frame, window_frame
# G1 기하학 모듈이 세그멘테이션 결과로 수직수평/직각도 분석
