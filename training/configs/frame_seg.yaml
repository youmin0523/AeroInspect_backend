path: ./datasets/frames
train: images/train
val: images/val
test: images/test

nc: 4
names:
  0: wall_edge
  1: ceiling_edge
  2: door_frame
  3: window_frame

# 데이터 분할: train 70% / val 15% / test 15%
# 목표 수량: 3,000장 (polygon 세그멘테이션 어노테이션)
